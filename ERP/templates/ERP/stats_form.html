{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Estatísticas - Arte & Sabor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/stand/global.css' %}">
    <link rel="stylesheet" href="{% static 'ERP/css/admin.css' %}">
    <link rel="stylesheet" href="{% static 'ERP/css/admin_header.css' %}">
    <link rel="stylesheet" href="{% static 'ERP/css/forms.css' %}">
</head>
<body>

{% include 'ERP/admin_header.html' %}

<div class="form-container">
    <h2>Editar Estatísticas</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="{{ form.happy_customers.id_for_label }}">Clientes Felizes</label>
            {{ form.happy_customers }}
        </div>
        <div class="form-group">
            <label for="{{ form.pastries_sold.id_for_label }}">Doces Vendidos</label>
            {{ form.pastries_sold }}
        </div>
        <div class="form-group">
            <label for="{{ form.years_experience.id_for_label }}">Anos de Experiência</label>
            {{ form.years_experience }}
        </div>
        <div class="form-group">
            <label for="{{ form.exclusive_recipes.id_for_label }}">Receitas Exclusivas</label>
            {{ form.exclusive_recipes }}
        </div>
        <button type="submit" class="submit-btn" style="margin-top: 15px;">Salvar</button>
        <a href="{% url 'ERP:admin' %}" class="cancel-link">Cancelar</a>
    </form>
</div>

</body>
</html>
